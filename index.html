<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shape10X — Healthcheck</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--black:#0A0A0A;--dark:#111;--card:#161616;--border:#2A2A2A;--text:#E8E8E8;--muted:#888;--gold:#C9A84C;--green:#4CAF60;--red:#E05555;--yellow:#D4A820}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--black);color:var(--text);font-family:-apple-system,'Segoe UI',monospace;font-size:13px;padding:24px}
.logo{font-size:22px;font-weight:900;color:#fff;margin-bottom:4px}.logo span{color:var(--gold)}
.sub{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:32px}
.check-list{display:flex;flex-direction:column;gap:6px;max-width:600px}
.check-item{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px}
.check-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.check-name{color:var(--muted);width:200px;flex-shrink:0}
.check-value{color:var(--text);font-weight:700}
.check-ms{color:var(--muted);font-size:11px;margin-left:auto}
.ok{color:var(--green)}.err{color:var(--red)}.loading{color:var(--yellow)}
.divider{height:1px;background:var(--border);margin:16px 0;max-width:600px}
.summary{max-width:600px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-top:16px}
.summary-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px}
.summary-status{font-size:18px;font-weight:900}
.btn-reload{margin-top:20px;padding:10px 20px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit}
.btn-reload:hover{border-color:var(--gold);color:var(--gold)}
.ts{color:var(--muted);font-size:11px;margin-top:8px}
</style>
</head>
<body>
<div class="logo">SHAPE<span>10X</span></div>
<div class="sub">System Healthcheck</div>

<div class="check-list" id="checks"></div>
<div class="divider"></div>
<div class="summary" id="summary"><div class="summary-title">Status geral</div><div class="summary-status loading">Verificando…</div></div>
<button class="btn-reload" onclick="runChecks()">↻ Verificar novamente</button>
<div class="ts" id="ts"></div>

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://bvwezccsmwqckvrzfdmi.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ2d2V6Y2NzbXdxY2t2cnpmZG1pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NzE1MjEsImV4cCI6MjA5NjM0NzUyMX0.7eUmtilLKPr2glBob-iXZz-0OLNy4zqGdr-Mnpfpg_g'
);

const TABLES = [
  { name:'alunos',            label:'Alunos ativos',      filter:{col:'status',val:'Ativo'} },
  { name:'treinos',           label:'Treinos ativos',     filter:{col:'ativo',val:true} },
  { name:'check_ins',         label:'Check-ins total' },
  { name:'cargas',            label:'Registros de carga' },
  { name:'dieta',             label:'Planos alimentares', filter:{col:'ativo',val:true} },
  { name:'feedbacks_semanais',label:'Feedbacks/Ajustes' },
  { name:'avaliacao_inicial', label:'Avaliações iniciais' },
  { name:'revisoes_mensais',  label:'Revisões mensais' },
];

function addCheck(icon, name, value, ms, cls) {
  const el = document.createElement('div');
  el.className = 'check-item';
  el.id = 'chk-' + name.replace(/\s/g,'-');
  el.innerHTML = `<div class="check-icon">${icon}</div><div class="check-name">${name}</div><div class="check-value ${cls}">${value}</div><div class="check-ms">${ms}</div>`;
  document.getElementById('checks').appendChild(el);
  return el;
}

function updateCheck(id, icon, value, ms, cls) {
  const el = document.getElementById('chk-' + id.replace(/\s/g,'-'));
  if (!el) return;
  el.querySelector('.check-icon').textContent = icon;
  el.querySelector('.check-value').textContent = value;
  el.querySelector('.check-value').className = 'check-value ' + cls;
  el.querySelector('.check-ms').textContent = ms;
}

async function runChecks() {
  document.getElementById('checks').innerHTML = '';
  document.getElementById('summary').innerHTML = '<div class="summary-title">Status geral</div><div class="summary-status loading">Verificando…</div>';
  let allOk = true;

  // 1. Conectividade
  addCheck('⏳','Supabase Conexão','Verificando…','','loading');
  const t0 = Date.now();
  const { data: connTest, error: connErr } = await sb.from('alunos').select('id').limit(1);
  const connMs = Date.now() - t0;
  if (connErr) {
    updateCheck('Supabase Conexão','🔴','FALHA — '+connErr.message,connMs+'ms','err');
    allOk = false;
  } else {
    updateCheck('Supabase Conexão','🟢','Conectado',connMs+'ms','ok');
  }

  // 2. Tabelas
  for (const t of TABLES) {
    addCheck('⏳', t.name, 'Verificando…', '', 'loading');
    const ta = Date.now();
    let q = sb.from(t.name).select('*', { count:'exact', head:true });
    if (t.filter) {
      q = q.eq(t.filter.col, t.filter.val);
    }
    const { count, error } = await q;
    const ms = Date.now() - ta;
    if (error) {
      updateCheck(t.name,'🔴','ERRO: '+error.message,ms+'ms','err');
      allOk = false;
    } else {
      const label = `${count} ${t.label}`;
      const cls = count === 0 ? 'loading' : 'ok';
      const icon = count === 0 ? '🟡' : '🟢';
      updateCheck(t.name, icon, label, ms+'ms', cls);
    }
  }

  // 3. Views
  const views = [
    { name:'v_aderencia',        label:'View aderência diária' },
    { name:'v_aderencia_semanal',label:'View aderência semanal' },
    { name:'v_painel_treinador', label:'View painel treinador' },
  ];
  for (const v of views) {
    addCheck('⏳', v.name, 'Verificando…', '', 'loading');
    const ta = Date.now();
    const { data, error } = await sb.from(v.name).select('*', { count:'exact', head:true });
    const ms = Date.now() - ta;
    if (error) {
      updateCheck(v.name,'🔴','ERRO: '+error.message,ms+'ms','err');
      allOk = false;
    } else {
      updateCheck(v.name,'🟢',v.label + ' — OK',ms+'ms','ok');
    }
  }

  // 4. Checkin mais recente
  addCheck('⏳','Último Check-in','Verificando…','','loading');
  const { data: lastCI } = await sb.from('check_ins').select('data, aluno_id').order('data',{ascending:false}).limit(1);
  if (lastCI?.[0]) {
    updateCheck('Último Check-in','🟢',lastCI[0].data,'','ok');
  } else {
    updateCheck('Último Check-in','🟡','Nenhum','','loading');
  }

  // Summary
  const now = new Date();
  document.getElementById('summary').innerHTML = `
    <div class="summary-title">Status geral</div>
    <div class="summary-status ${allOk?'ok':'err'}">${allOk ? '🟢 Sistema saudável' : '🔴 Atenção: erros detectados'}</div>`;
  document.getElementById('ts').textContent = 'Verificado em: ' + now.toLocaleString('pt-BR');
}

runChecks();
</script>
</body>
</html>

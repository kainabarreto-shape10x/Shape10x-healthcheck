<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shape10X — Healthcheck</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--black:#0A0A0A;--dark:#111;--card:#161616;--border:#2A2A2A;--text:#E8E8E8;--muted:#888;--gold:#C9A84C;--green:#4CAF60;--red:#E05555;--yellow:#D4A820}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--black);color:var(--text);font-family:-apple-system,'Segoe UI',monospace;font-size:13px;padding:24px}
.logo{font-size:22px;font-weight:900;color:#fff;margin-bottom:4px}.logo span{color:var(--gold)}
.sub{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:32px}

/* Login gate - item 6, Fase 6 (23/07/2026). Esse app lia as tabelas
   direto como anon, sem sessao - virou inutil sozinho quando o RLS por
   identidade entrou em vigor (anon nao tem mais acesso a nada). Mesmo
   padrao de login do Painel, restrito a quem esta em trainer_users. */
.auth-gate{position:fixed;inset:0;z-index:999;background:var(--black);display:flex;align-items:center;justify-content:center;padding:24px}
.auth-gate.hide{display:none}
.auth-card{width:100%;max-width:320px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px 24px;text-align:center}
.auth-field{text-align:left;margin-bottom:12px}
.auth-field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.auth-field input{width:100%;padding:10px;border-radius:6px;border:1px solid var(--border);background:var(--dark);color:var(--text);font-size:13px;font-family:inherit}
.btn-auth{width:100%;padding:10px;border-radius:6px;border:none;background:var(--gold);color:#000;font-weight:800;font-size:13px;cursor:pointer;margin-top:6px;font-family:inherit}
.auth-error{color:var(--red);font-size:11px;margin-top:10px;min-height:14px}

.check-list{display:flex;flex-direction:column;gap:10px;max-width:640px}
.run-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.run-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.run-date{color:var(--text);font-weight:700}
.run-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px}
.run-badge.ok{background:rgba(76,175,96,.15);color:var(--green)}
.run-badge.warn{background:rgba(212,168,32,.15);color:var(--yellow)}
.achado{padding:6px 0;border-top:1px solid rgba(255,255,255,.06);font-size:12px;display:flex;gap:8px}
.achado:first-child{border-top:none}
.muted{color:var(--muted)}
.btn-reload{margin-top:20px;padding:10px 20px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit}
.btn-reload:hover{border-color:var(--gold);color:var(--gold)}
.btn-logout{margin-top:8px;margin-left:8px;padding:10px 20px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit}
.ts{color:var(--muted);font-size:11px;margin-top:8px}
</style>
</head>
<body>

<div class="auth-gate" id="auth-gate">
  <div class="auth-card">
    <div class="logo">SHAPE<span>10X</span></div>
    <div class="sub" style="margin-bottom:20px">Healthcheck</div>
    <div class="auth-field">
      <label for="auth-email">E-mail</label>
      <input type="email" id="auth-email" autocomplete="username">
    </div>
    <div class="auth-field">
      <label for="auth-senha">Senha</label>
      <input type="password" id="auth-senha" autocomplete="current-password">
    </div>
    <button class="btn-auth" onclick="fazerLogin()">Entrar</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<div class="logo">SHAPE<span>10X</span></div>
<div class="sub">System Healthcheck</div>

<div class="check-list" id="runs"></div>
<button class="btn-reload" onclick="carregar()">↻ Atualizar</button>
<button class="btn-logout" onclick="sb.auth.signOut().then(()=>location.reload())">Sair</button>
<div class="ts" id="ts"></div>

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://bvwezccsmwqckvrzfdmi.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ2d2V6Y2NzbXdxY2t2cnpmZG1pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NzE1MjEsImV4cCI6MjA5NjM0NzUyMX0.7eUmtilLKPr2glBob-iXZz-0OLNy4zqGdr-Mnpfpg_g'
);

async function fazerLogin(){
  const email = document.getElementById('auth-email').value.trim();
  const senha = document.getElementById('auth-senha').value;
  const errEl = document.getElementById('auth-error');
  if(!email || !senha){ errEl.textContent='Preencha e-mail e senha.'; return; }
  errEl.textContent='';
  const {error} = await sb.auth.signInWithPassword({email, password:senha});
  if(error){ errEl.textContent='E-mail ou senha incorretos.'; return; }
  iniciar();
}

function iniciar(){
  document.getElementById('auth-gate').classList.add('hide');
  carregar();
}

(async function boot(){
  const {data:{session}} = await sb.auth.getSession();
  if(session) iniciar();
})();

// Le system_healthcheck_log (populado 1x/dia por run_system_healthcheck()
// via pg_cron, item 7 do briefing original). RLS ja restringe essa
// leitura a quem esta em trainer_users - sem sessao valida, vem vazio.
async function carregar(){
  const el = document.getElementById('runs');
  el.innerHTML = '<div class="muted">Carregando…</div>';
  const { data, error } = await sb.from('system_healthcheck_log')
    .select('*').order('executado_em', { ascending:false }).limit(14);
  if(error){
    el.innerHTML = `<div class="run-card"><span style="color:var(--red)">Erro ao carregar: ${error.message}</span></div>`;
    return;
  }
  if(!data || !data.length){
    el.innerHTML = '<div class="muted">Nenhuma execução registrada ainda.</div>';
    return;
  }
  el.innerHTML = data.map(r => {
    const quando = new Date(r.executado_em).toLocaleString('pt-BR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
    const ok = !r.total_achados;
    const achados = (r.achados || []).map(a => `<div class="achado"><span>${a.gravidade === 'critico' ? '🔴' : '🟡'}</span><span>${a.descricao}</span></div>`).join('');
    return `<div class="run-card">
      <div class="run-head">
        <span class="run-date">${quando}</span>
        <span class="run-badge ${ok?'ok':'warn'}">${ok ? '✓ tudo certo' : r.total_achados + ' ponto(s)'}</span>
      </div>
      ${achados || '<div class="muted" style="font-size:12px">Nenhum achado.</div>'}
    </div>`;
  }).join('');
  document.getElementById('ts').textContent = 'Atualizado em: ' + new Date().toLocaleString('pt-BR');
}
</script>
</body>
</html>

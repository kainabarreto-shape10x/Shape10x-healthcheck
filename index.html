<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shape10X — Health Check</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0a0a;font-family:'DM Sans',sans-serif;color:#f0f0f0;min-height:100vh}a{text-decoration:none}</style>
</head>
<body>
<div id="root"></div>
<script>
const{useState,useEffect,useCallback,createElement:h}=React;

const PROXY='https://bvwezccsmwqckvrzfdmi.supabase.co/functions/v1/healthcheck-proxy';
const URLS={
  painel:'https://shape10x-painel.vercel.app',
  portal:'https://shape10x-portal.vercel.app',
  avaliacao:'https://shape10x-avaliacao.vercel.app',
  'portal Gabriel':'https://shape10x-portal.vercel.app/gabriel-vernetti.html',
};

const TESTES=[
  {id:'db_alunos',label:'Banco — alunos',grupo:'🗄️ Banco'},
  {id:'db_treinos',label:'Banco — treinos',grupo:'🗄️ Banco'},
  {id:'db_checkins',label:'Banco — check_ins',grupo:'🗄️ Banco'},
  {id:'db_cargas',label:'Banco — cargas',grupo:'🗄️ Banco'},
  {id:'db_dieta',label:'Banco — dieta',grupo:'🗄️ Banco'},
  {id:'db_revisoes',label:'Banco — revisoes_mensais',grupo:'🗄️ Banco'},
  {id:'db_feedbacks',label:'Banco — feedbacks_semanais',grupo:'🗄️ Banco'},
  {id:'gabriel_treino',label:'Gabriel — treino ativo',grupo:'👤 Alunos'},
  {id:'gabriel_dieta',label:'Gabriel — dieta ativa',grupo:'👤 Alunos'},
  {id:'gabriel_checkins',label:'Gabriel — check-ins registrados',grupo:'👤 Alunos'},
  {id:'semaforo',label:'Semáforo — lógica correta',grupo:'⚙️ Fluxos'},
  {id:'carga_upsert',label:'Cargas — upsert sem duplicar',grupo:'⚙️ Fluxos'},
  {id:'checkin_upsert',label:'Check-in — mesmo dia não duplica',grupo:'⚙️ Fluxos'},
  {id:'val_peso',label:'Validação — peso inválido rejeitado',grupo:'⚙️ Fluxos'},
  {id:'val_sono',label:'Validação — sono inválido rejeitado',grupo:'⚙️ Fluxos'},
  {id:'val_dieta',label:'Validação — dieta % inválido rejeitado',grupo:'⚙️ Fluxos'},
];

function App(){
  const[res,setRes]=useState({});
  const[rodando,setRodando]=useState(false);
  const[ultima,setUltima]=useState(null);
  const[auto,setAuto]=useState(false);
  const[iv,setIv]=useState('1h');
  const[erro,setErro]=useState(null);

  const rodar=useCallback(async()=>{
    setRodando(true);setErro(null);
    // Marcar todos como rodando
    const init={};TESTES.forEach(t=>{init[t.id]={status:'rodando'};});
    setRes({...init});
    try{
      const r=await fetch(PROXY,{method:'GET',headers:{'Content-Type':'application/json'}});
      if(!r.ok)throw new Error(`Proxy HTTP ${r.status}`);
      const data=await r.json();
      if(data.error)throw new Error(data.error);
      const novo={};
      Object.entries(data.results||{}).forEach(([k,v])=>{
        novo[k]={status:v.ok?'ok':'erro',msg:v.msg};
      });
      setRes(novo);
      setUltima(new Date());
    }catch(e){
      setErro(e.message);
      const fail={};TESTES.forEach(t=>{fail[t.id]={status:'erro',msg:'Proxy inacessível'};});
      setRes(fail);
    }
    setRodando(false);
  },[]);

  useEffect(()=>{rodar();},[]);
  useEffect(()=>{
    if(!auto)return;
    const ms=iv==='1h'?3600000:iv==='6h'?21600000:86400000;
    const timer=setInterval(rodar,ms);
    return()=>clearInterval(timer);
  },[auto,iv,rodar]);

  const grupos=[...new Set(TESTES.map(t=>t.grupo))];
  const ok=Object.values(res).filter(r=>r?.status==='ok').length;
  const erros=Object.values(res).filter(r=>r?.status==='erro').length;
  const total=TESTES.length;
  const score=total>0?Math.round(ok/total*100):0;
  const corScore=score===100?'#3ecf8e':score>=70?'#D4A843':'#f87171';

  const s={
    page:{background:'#0a0a0a',minHeight:'100vh',padding:'20px',maxWidth:480,margin:'0 auto'},
    hdr:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18},
    logo:{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:2,color:'#D4A843'},
    sub:{fontSize:10,color:'#555',marginTop:2,letterSpacing:1,textTransform:'uppercase'},
    scoreVal:{fontSize:40,fontWeight:900,color:corScore,lineHeight:1,textAlign:'right'},
    scoreSub:{fontSize:10,color:'#555',marginTop:2,textAlign:'right'},
    bar:{height:5,background:'#1a1a1a',borderRadius:3,marginBottom:16,overflow:'hidden'},
    barFill:{height:'100%',width:`${score}%`,background:corScore,borderRadius:3,transition:'width 0.6s'},
    kpiGrid:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:14},
    kpi:{background:'#111',border:'1px solid #1e1e1e',borderRadius:10,padding:'12px 8px',textAlign:'center'},
    kpiVal:{fontSize:22,fontWeight:900},
    kpiLbl:{fontSize:9,color:'#555',marginTop:2,textTransform:'uppercase',letterSpacing:0.5},
    card:{background:'#111',border:'1px solid #1e1e1e',borderRadius:12,padding:'14px 16px',marginBottom:10},
    cardTitle:{fontSize:10,fontWeight:700,color:'#555',textTransform:'uppercase',letterSpacing:1,marginBottom:10},
    linkRow:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:'1px solid #161616'},
    linkLbl:{fontSize:11,color:'#777',textTransform:'capitalize'},
    linkHref:{fontSize:11,color:'#D4A843',fontWeight:600},
    row:{display:'flex',alignItems:'flex-start',gap:10,padding:'8px 0',borderBottom:'1px solid #161616'},
    rowIcon:{fontSize:14,flexShrink:0,marginTop:1,width:18},
    rowLbl:{fontSize:12,fontWeight:500,color:'#ddd'},
    rowMsg:{fontSize:10,marginTop:2},
    actions:{display:'flex',gap:8,marginTop:14,marginBottom:8},
    btnP:{flex:1,padding:'14px',background:rodando?'#161616':'#D4A843',color:rodando?'#555':'#000',border:'none',borderRadius:12,fontSize:13,fontWeight:700,cursor:rodando?'not-allowed':'pointer',fontFamily:"'DM Sans',sans-serif"},
    btnS:{padding:'14px 12px',background:auto?'rgba(62,207,142,0.12)':'#161616',color:auto?'#3ecf8e':'#666',border:`1px solid ${auto?'rgba(62,207,142,0.25)':'#222'}`,borderRadius:12,fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:"'DM Sans',sans-serif",whiteSpace:'nowrap'},
    ivGrid:{display:'flex',gap:8,marginBottom:8},
    ivBtn:(v)=>({flex:1,padding:'8px',background:iv===v?'rgba(212,168,67,0.15)':'#161616',color:iv===v?'#D4A843':'#666',border:`1px solid ${iv===v?'rgba(212,168,67,0.3)':'#222'}`,borderRadius:8,fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}),
    footer:{textAlign:'center',fontSize:10,color:'#333',marginTop:10},
    errBox:{background:'rgba(248,113,113,0.1)',border:'1px solid rgba(248,113,113,0.3)',borderRadius:10,padding:'10px 14px',marginBottom:12,fontSize:11,color:'#f87171'},
  };

  return h('div',{style:s.page},
    h('div',{style:s.hdr},
      h('div',null,h('div',{style:s.logo},'SHAPE10X'),h('div',{style:s.sub},'Agente de Verificação')),
      h('div',null,h('div',{style:s.scoreVal},score+'%'),h('div',{style:s.scoreSub},`${ok}/${total} ok`))
    ),
    h('div',{style:s.bar},h('div',{style:s.barFill})),
    erro?h('div',{style:s.errBox},'⚠️ '+erro):null,
    h('div',{style:s.kpiGrid},
      h('div',{style:s.kpi},h('div',{style:{...s.kpiVal,color:'#3ecf8e'}},ok),h('div',{style:s.kpiLbl},'✅ Ok')),
      h('div',{style:s.kpi},h('div',{style:{...s.kpiVal,color:'#f87171'}},erros),h('div',{style:s.kpiLbl},'❌ Erros')),
      h('div',{style:s.kpi},h('div',{style:{...s.kpiVal,color:'#D4A843'}},Object.values(res).filter(r=>r?.status==='rodando').length),h('div',{style:s.kpiLbl},'⏳ Rodando')),
    ),
    h('div',{style:s.card},
      h('div',{style:s.cardTitle},'🔗 Links da Plataforma'),
      ...Object.entries(URLS).map(([k,url],i,arr)=>
        h('div',{style:{...s.linkRow,borderBottom:i===arr.length-1?'none':'1px solid #161616'},key:k},
          h('span',{style:s.linkLbl},k),
          h('a',{href:url,target:'_blank',style:s.linkHref},url.replace('https://','').slice(0,38)+' →')
        )
      )
    ),
    ...grupos.map(grupo=>
      h('div',{style:s.card,key:grupo},
        h('div',{style:s.cardTitle},grupo),
        ...TESTES.filter(t=>t.grupo===grupo).map((t,i,arr)=>{
          const r=res[t.id];
          const st=r?.status||'pendente';
          const ic=st==='ok'?'✅':st==='erro'?'❌':st==='rodando'?'⏳':'○';
          const c=st==='ok'?'#3ecf8e':st==='erro'?'#f87171':st==='rodando'?'#D4A843':'#444';
          return h('div',{style:{...s.row,borderBottom:i===arr.length-1?'none':'1px solid #161616'},key:t.id},
            h('span',{style:s.rowIcon},ic),
            h('div',{style:{flex:1}},
              h('div',{style:s.rowLbl},t.label),
              r?.msg?h('div',{style:{...s.rowMsg,color:c}},r.msg):null
            )
          );
        })
      )
    ),
    h('div',{style:s.actions},
      h('button',{style:s.btnP,onClick:rodar,disabled:rodando},rodando?'⏳ Verificando...':'▶ Verificar agora'),
      h('button',{style:s.btnS,onClick:()=>setAuto(a=>!a)},auto?'🔁 Auto ON':'🔁 Auto OFF')
    ),
    auto?h('div',{style:s.ivGrid},
      ...['1h','6h','24h'].map(v=>h('button',{key:v,style:s.ivBtn(v),onClick:()=>setIv(v)},`A cada ${v}`))
    ):null,
    ultima?h('div',{style:s.footer},`Última verificação: ${ultima.toLocaleTimeString('pt-BR')} — ${ultima.toLocaleDateString('pt-BR')}`):null
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
